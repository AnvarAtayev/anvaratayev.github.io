{{- $scholar := .Get "scholar" -}}
{{- $orcid := .Get "orcid" -}}
<div class="profile-icons">
{{- if $scholar -}}
  <a href="{{ $scholar }}" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar" title="Google Scholar">
    {{ readFile "static/svg/google-scholar.svg" | safeHTML }}
  </a>
{{- end -}}
{{- if $orcid -}}
  <a href="https://orcid.org/{{ $orcid }}" target="_blank" rel="noopener noreferrer" aria-label="ORCID {{ $orcid }}" title="ORCID {{ $orcid }}">
    {{ readFile "static/svg/orcid.svg" | safeHTML }}
  </a>
{{- end -}}
</div>
